{% extends "base_public.html" %}
{% block content %}
<div class="glass-card auth-card">
    <a href="/" class="back-link">← Back</a>
    <h2>Register</h2>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" onsubmit="return validatePassword()">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" name="mobile">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirm" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>UPI ID <span style="opacity:0.6;font-size:12px;">(optional)</span></label>
            <input type="text" name="upi_id" placeholder="e.g. yourname@okaxis">
        </div>
        <div class="button-row" style="margin-top:20px;">
            <button type="submit" class="primary-btn">Register</button>
            <a href="/login" class="secondary-btn">Login</a>
        </div>
    </form>
</div>
{% endblock %}
