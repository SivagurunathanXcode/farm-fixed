{% extends "base_public.html" %}
{% block content %}
<div class="glass-card auth-card">
    <h2>Enter OTP</h2>
    <p style="opacity:0.85;margin-bottom:20px;">A 6-digit OTP has been generated. Check the server console if email is not configured.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label>OTP</label>
            <input type="text" name="otp" maxlength="6" required placeholder="Enter 6-digit OTP">
        </div>
        <div class="button-row">
            <button type="submit" class="primary-btn">Verify</button>
            <a href="/forgot" class="secondary-btn">Resend</a>
        </div>
    </form>
</div>
{% endblock %}
